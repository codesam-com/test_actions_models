name: Frase motivadora automática

on:
  workflow_dispatch:
#  schedule:
#    - cron: "*/5 * * * *"

permissions:
  contents: write
  models: read

jobs:
  generar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generar frase
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MODEL_ID: meta/meta-llama-3.1-8b-instruct
          OUTPUT_FILE: data/motivacion.log
        run: python scripts/generar_motivacion.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/motivacion.log

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "chore: update motivacion"
          git push
